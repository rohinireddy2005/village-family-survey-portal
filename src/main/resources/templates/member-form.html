<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add / Edit Member</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-4">

    <h2 th:text="${member.id} == null ? 'Add Member' : 'Edit Member'"></h2>

<form th:action="@{|/family/${family.id}/members/save|}"
      th:object="${member}" method="post">


        <!-- Hidden ID for Edit -->
        <input type="hidden" th:field="*{id}" />

        <!-- ================= FORM FIELDS ================= -->

        <div class="mb-3">
            <label class="form-label">Member Name</label>
            <input type="text" th:field="*{memberName}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Age</label>
            <input type="number" min="0" th:field="*{age}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Gender</label>
            <select th:field="*{gender}" class="form-select" required>
                <option value="">-- Select --</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Relation</label>
            <input type="text" th:field="*{relation}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Education</label>
            <input type="text" th:field="*{education}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Occupation</label>
            <input type="text" th:field="*{occupation}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Income</label>
            <input type="number" step="0.01"
                   th:field="*{income}" class="form-control">
        </div>

        <div class="mb-3 form-check">
            <input type="checkbox"
                   th:field="*{schoolGoing}"
                   class="form-check-input"
                   id="schoolGoing">
            <label class="form-check-label" for="schoolGoing">School Going</label>
        </div>

        <!-- ================= ACTION BUTTONS ================= -->

        <button type="submit" class="btn btn-success">Save</button>

       <a th:href="@{|/family/details/${family.id}|}" class="btn btn-secondary">Back</a>
       

    </form>

</div>
</body>
</html>
