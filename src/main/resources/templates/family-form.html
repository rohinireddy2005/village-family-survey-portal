<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add / Edit Family</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-4">

    <h2 th:text="${family.id} == null ? 'Add Family' : 'Edit Family'"></h2>

    <form th:action="@{/family/save}" th:object="${family}" method="post">

        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label">Family Name</label>
            <input type="text" th:field="*{familyName}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Head Name</label>
            <input type="text" th:field="*{headName}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Head Gender</label><br>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio"
                       th:field="*{headGender}" value="Male" required>
                <label class="form-check-label">Male</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio"
                       th:field="*{headGender}" value="Female">
                <label class="form-check-label">Female</label>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Head Education</label>
            <select th:field="*{educationLevel}" class="form-select" required>
                <option value="">-- Select Education --</option>
                <option value="Illiterate">Illiterate</option>
                <option value="Primary">Primary</option>
                <option value="Secondary">Secondary</option>
                <option value="Graduate">Graduate</option>
                <option value="Post Graduate">Post Graduate</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Head Occupation</label>
            <input type="text" th:field="*{headOccupation}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Head Income</label>
            <input type="number" th:field="*{headIncome}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Family Type</label>
            <select th:field="*{familyType}" class="form-select" required>
                <option value="Nuclear">Nuclear</option>
                <option value="Joint">Joint</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Address</label>
            <input type="text" th:field="*{address}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Village Name</label>
            <input type="text" th:field="*{villageName}" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-success">Save</button>
        <a href="/family/list" class="btn btn-secondary">Cancel</a>

    </form>
</div>

</body>
</html>
