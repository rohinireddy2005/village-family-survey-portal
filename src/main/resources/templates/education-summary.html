<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Village Education Summary</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>
<div class="container mt-4">
    <h2 class="mb-3">Village Education Summary</h2>

    <div class="row">
        <div class="col-md-3 mb-3">
            <div class="card bg-info text-white">
                <div class="card-body">
                    <h6>School-going Children (5-18)</h6>
                    <h3 th:text="${stats.schoolGoingChildren}">0</h3>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card bg-warning text-dark">
                <div class="card-body">
                    <h6>Dropouts</h6>
                    <h3 th:text="${stats.dropouts}">0</h3>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card bg-success text-white">
                <div class="card-body">
                    <h6>Highest Education</h6>
                    <h3 th:text="${stats.highestEducation}">N/A</h3>
                </div>
            </div>
        </div>
    </div>

    <a th:href="@{/dashboard}" class="btn btn-primary mt-3">Back to Dashboard</a>
</div>
</body>
</html>
