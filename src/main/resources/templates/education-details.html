<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Education Tracking</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>
<div class="container mt-4">

    <h2 class="mb-4">Education Tracking</h2>

    <!-- ================= EDUCATION DISTRIBUTION ================= -->
    <h4>Education Level Distribution</h4>
    <table class="table table-bordered">
        <thead>
        <tr>
            <th>Education Level</th>
            <th>Count</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="e : ${educationMap}">
            <td th:text="${e.key}"></td>
            <td th:text="${e.value}"></td>
        </tr>
        </tbody>
    </table>

    <!-- ================= SCHOOL CHILDREN ================= -->
    <h4 class="mt-5">School Going Children</h4>
    <table class="table table-bordered">
        <thead>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Education</th>
            <th>Family</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="m : ${schoolChildren}">
            <td th:text="${m.memberName}"></td>
            <td th:text="${m.age}"></td>
            <td th:text="${m.education}"></td>
            <td th:text="${m.family.familyName}"></td>
        </tr>
        </tbody>
    </table>

    <!-- ================= DROPOUTS ================= -->
    <h4 class="mt-5 text-danger">Dropout Members</h4>
    <table class="table table-bordered">
        <thead>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Education</th>
            <th>Family</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="m : ${dropouts}">
            <td th:text="${m.memberName}"></td>
            <td th:text="${m.age}"></td>
            <td th:text="${m.education}"></td>
            <td th:text="${m.family.familyName}"></td>
        </tr>
        </tbody>
    </table>

    <a href="/dashboard" class="btn btn-secondary mt-4">
        Back to Dashboard
    </a>

</div>
</body>
</html>
