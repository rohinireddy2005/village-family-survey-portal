<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Family List</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>
<div class="container mt-4">

    <h2 class="mb-3">Village Families</h2>

    <!-- ================= SEARCH & FILTER ================= -->
    <form method="get" th:action="@{/family/list}" class="row mb-3">
        <div class="col-md-4">
            <input type="text" name="name"
                   th:value="${name}"
                   class="form-control"
                   placeholder="Search by family name">
        </div>

        <div class="col-md-3">
            <select name="bplApl" class="form-select">
                <option value="">All</option>
                <option value="BPL" th:selected="${bplApl == 'BPL'}">BPL</option>
                <option value="APL" th:selected="${bplApl == 'APL'}">APL</option>
            </select>
        </div>

        <div class="col-md-3">
            <button type="submit" class="btn btn-primary">
                Search
            </button>
            <a th:href="@{/family/list}" class="btn btn-secondary">
                Reset
            </a>
        </div>
    </form>

    <!-- ================= ADD FAMILY BUTTON ================= -->
    <a th:href="@{/family/add}" class="btn btn-success mb-3">Add Family</a>

    <!-- ================= FAMILY TABLE ================= -->
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Family Name</th>
            <th>Head</th>
            <th>Village</th>
            <th>Total Income</th>
            <th>BPL/APL</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="family : ${families}">
            <td th:text="${family.id}"></td>
            <td th:text="${family.familyName}"></td>
            <td th:text="${family.headName}"></td>
            <td th:text="${family.villageName}"></td>
            <td th:text="${family.totalIncome}"></td>
            <td th:text="${family.bplApl}"></td>
            <td>
                <!-- View Family Details -->
                <a th:href="@{|/family/details/${family.id}|}"
                   class="btn btn-info btn-sm">View</a>

                <!-- Edit Family -->
                <a th:href="@{|/family/edit/${family.id}|}"
                   class="btn btn-warning btn-sm">Edit</a>

                <!-- Delete Family -->
                <a th:href="@{|/family/delete/${family.id}|}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Delete this family?')">
                    Delete
                </a>

            </td>
        </tr>

        <!-- Message if no families found -->
        <tr th:if="${#lists.isEmpty(families)}">
            <td colspan="7" class="text-center text-danger">
                No families found
            </td>
        </tr>
        </tbody>
    </table>

</div>
</body>
</html>
